<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" fill="none">
  <!-- Livo Assistant — mic + sound waves (not v0) -->
  <rect width="180" height="180" rx="40" fill="#15c39a"/>
  <!-- mic body -->
  <rect x="72" y="42" width="36" height="58" rx="18" fill="#ffffff"/>
  <!-- mic stand arc -->
  <path d="M54 92c0 22 16 38 36 38s36-16 36-38" stroke="#ffffff" stroke-width="8" stroke-linecap="round" fill="none"/>
  <!-- mic stem -->
  <line x1="90" y1="130" x2="90" y2="148" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <line x1="72" y1="148" x2="108" y2="148" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- sound waves -->
  <path d="M128 70c8 8 8 32 0 40" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>
  <path d="M142 58c14 14 14 50 0 64" stroke="#ffffff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.55"/>
</svg>
